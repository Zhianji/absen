<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Absensi - Masuk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
<style>
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
    position: relative;
    background: linear-gradient(135deg, var(--bg) 0%, var(--primary-bg) 100%);
    background-size: 200% 200%;
    animation: bgShift 12s ease-in-out infinite;
  }

  @keyframes bgShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* Blob dekoratif melayang halus di belakang form */
  .bg-blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.35;
    z-index: 0;
    pointer-events: none;
    animation: floatBlob 10s ease-in-out infinite;
  }
  .bg-blob.one {
    width: 260px; height: 260px;
    background: var(--primary);
    top: -60px; left: -60px;
  }
  .bg-blob.two {
    width: 220px; height: 220px;
    background: var(--amber);
    bottom: -50px; right: -50px;
    animation-delay: -4s;
  }
  @keyframes floatBlob {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(20px, -20px) scale(1.08); }
  }

  .login-wrap {
    width: 100%;
    max-width: 380px;
    position: relative;
    z-index: 1;
    opacity: 0;
    transform: translateY(24px);
    animation: fadeSlideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  @keyframes fadeSlideUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .brand {
    text-align: center;
    margin-bottom: 28px;
    opacity: 0;
    transform: translateY(12px);
    animation: fadeSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    animation-delay: 0.1s;
  }
  .brand .mark {
    width: 52px; height: 52px;
    border-radius: 14px;
    background: var(--primary);
    color: #fff;
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 14px;
    box-shadow: 0 8px 20px rgba(46, 92, 230, 0.35);
    animation: markPulse 3s ease-in-out infinite;
  }
  @keyframes markPulse {
    0%, 100% { transform: scale(1); box-shadow: 0 8px 20px rgba(46, 92, 230, 0.35); }
    50% { transform: scale(1.05); box-shadow: 0 10px 26px rgba(46, 92, 230, 0.45); }
  }
  .brand h1 { font-size: 20px; color: var(--ink); }
  .brand p { color: var(--ink-soft); font-size: 13px; margin-top: 4px; }

  .tabs {
    display: flex;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 4px;
    margin-bottom: 20px;
    position: relative;
    opacity: 0;
    transform: translateY(12px);
    animation: fadeSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    animation-delay: 0.18s;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 9px 0;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink-soft);
    cursor: pointer;
    background: none;
    border: none;
    position: relative;
    z-index: 1;
    transition: color 0.25s ease;
  }
  .tab.active { color: var(--primary); }
  .tab-indicator {
    position: absolute;
    top: 4px; bottom: 4px;
    left: 4px;
    width: calc(50% - 4px);
    background: var(--surface);
    border-radius: 6px;
    box-shadow: var(--shadow);
    transition: transform 0.32s cubic-bezier(0.65, 0, 0.35, 1);
  }
  .tab-indicator.guru { transform: translateX(100%); }

  .login-panel {
    padding: 28px;
    opacity: 0;
    transform: translateY(12px);
    animation: fadeSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    animation-delay: 0.26s;
    transition: box-shadow 0.3s ease;
  }
  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-soft);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .field input {
    transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
  }
  .field input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-bg);
  }
  .login-panel .btn-primary {
    width: 100%;
    margin-top: 6px;
    position: relative;
    overflow: hidden;
  }
  .login-panel .btn-primary:hover:not(:disabled) {
    box-shadow: 0 6px 16px rgba(46, 92, 230, 0.3);
  }

  /* Transisi swap form Siswa / Guru */
  #formSiswa, #formGuru {
    animation: formFade 0.35s ease;
  }
  @keyframes formFade {
    from { opacity: 0; transform: translateX(8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .err-msg {
    color: var(--danger);
    font-size: 13px;
    margin-top: 12px;
    text-align: center;
    display: none;
  }
  .err-msg.show {
    display: block;
    animation: shakeFade 0.4s ease;
  }
  @keyframes shakeFade {
    0% { opacity: 0; transform: translateX(0); }
    25% { transform: translateX(-4px); }
    50% { transform: translateX(4px); }
    75% { transform: translateX(-2px); }
    100% { opacity: 1; transform: translateX(0); }
  }

  .credit {
    text-align: center;
    margin-top: 18px;
    font-size: 12px;
    color: var(--ink-faint);
    opacity: 0;
    animation: fadeSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    animation-delay: 0.4s;
  }

  .hidden { display: none; }

  @media (prefers-reduced-motion: reduce) {
    body, .bg-blob, .login-wrap, .brand, .brand .mark, .tabs, .login-panel,
    #formSiswa, #formGuru, .err-msg, .credit {
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
    }
  }
</style>
</head>
<body>

<div class="bg-blob one"></div>
<div class="bg-blob two"></div>

<div class="login-wrap">
  <div class="brand">
    <div class="mark">A</div>
    <h1>Absensi Digital</h1>
    <p>Masuk sesuai peranmu untuk melanjutkan</p>
  </div>

  <div class="tabs">
    <div class="tab-indicator" id="tabIndicator"></div>
    <button class="tab active" id="tabSiswa" onclick="switchTab('siswa')">Siswa</button>
    <button class="tab" id="tabGuru" onclick="switchTab('guru')">Guru</button>
  </div>

  <div class="card login-panel">
    <!-- FORM SISWA -->
    <form id="formSiswa" onsubmit="return submitSiswa(event)">
      <div class="field">
        <label for="nis">NIS</label>
        <input id="nis" type="text" inputmode="numeric" placeholder="Nomor Induk Siswa" required />
      </div>
      <div class="field">
        <label for="passSiswa">Password</label>
        <input id="passSiswa" type="password" placeholder="Password" required />
      </div>
      <button class="btn-primary" type="submit" id="btnSiswa">Masuk sebagai Siswa</button>
    </form>

    <!-- FORM GURU -->
    <form id="formGuru" class="hidden" onsubmit="return submitGuru(event)">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" type="text" placeholder="Username guru" required />
      </div>
      <div class="field">
        <label for="passGuru">Password</label>
        <input id="passGuru" type="password" placeholder="Password" required />
      </div>
      <button class="btn-primary" type="submit" id="btnGuru">Masuk sebagai Guru</button>
    </form>

    <p class="err-msg" id="errMsg"></p>
  </div>

  <p class="credit">&copy; Copyright Pak Reza</p>
</div>

<script src="config.js"></script>
<script>
  function switchTab(role) {
    const isSiswa = role === 'siswa';
    document.getElementById('tabSiswa').classList.toggle('active', isSiswa);
    document.getElementById('tabGuru').classList.toggle('active', !isSiswa);
    document.getElementById('tabIndicator').classList.toggle('guru', !isSiswa);
    document.getElementById('formSiswa').classList.toggle('hidden', !isSiswa);
    document.getElementById('formGuru').classList.toggle('hidden', isSiswa);
    hideErr();
  }

  function showErr(msg) {
    const el = document.getElementById('errMsg');
    el.textContent = msg;
    el.classList.remove('show');
    // trigger reflow supaya animasi shake bisa diulang
    void el.offsetWidth;
    el.classList.add('show');
  }
  function hideErr() {
    document.getElementById('errMsg').classList.remove('show');
  }

  async function submitSiswa(e) {
    e.preventDefault();
    hideErr();
    const btn = document.getElementById('btnSiswa');
    btn.disabled = true; btn.textContent = 'Memeriksa...';
    const nis = document.getElementById('nis').value.trim();
    const password = document.getElementById('passSiswa').value;
    try {
      const res = await apiPost('loginSiswa', { nis, password });
      if (res.ok) {
        saveSession(res.token, 'siswa', res.nama);
        window.location.href = 'absen-siswa.html';
      } else {
        showErr(res.error || 'Login gagal');
      }
    } catch (err) {
      showErr('Tidak bisa terhubung ke server. Cek koneksi internet.');
    } finally {
      btn.disabled = false; btn.textContent = 'Masuk sebagai Siswa';
    }
    return false;
  }

  async function submitGuru(e) {
    e.preventDefault();
    hideErr();
    const btn = document.getElementById('btnGuru');
    btn.disabled = true; btn.textContent = 'Memeriksa...';
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('passGuru').value;
    try {
      const res = await apiPost('loginGuru', { username, password });
      if (res.ok) {
        saveSession(res.token, 'guru', res.nama);
        window.location.href = 'dashboard-guru-enhanced.html';
      } else {
        showErr(res.error || 'Login gagal');
      }
    } catch (err) {
      showErr('Tidak bisa terhubung ke server. Cek koneksi internet.');
    } finally {
      btn.disabled = false; btn.textContent = 'Masuk sebagai Guru';
    }
    return false;
  }

  // Jika sudah login, langsung redirect
  (function autoRedirect() {
    const token = getToken();
    const role = getRole();
    if (token && role === 'siswa') window.location.href = 'absen-siswa.html';
    else if (token && role === 'guru') window.location.href = 'dashboard-guru-enhanced.html';
  })();
</script>
</body>
</html>
